<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSL/TLS 安全保障 | 毕业设计展</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
        }

        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(52, 199, 89, 0.1) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 150px;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #34c759 0%, #30b0c7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-text {
            font-size: 1rem;
            color: #ff453a;
            font-weight: 300;
            min-height: 1.5rem;
        }

        .status-text.success {
            color: #34c759;
        }

        /* 加密展示区域 */
        .crypto-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 数据对比展示 */
        .data-comparison {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .data-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.5s ease;
        }

        .data-card.danger {
            border-color: rgba(255, 69, 58, 0.5);
        }

        .data-card.safe {
            border-color: rgba(52, 199, 89, 0.5);
            background: rgba(52, 199, 89, 0.05);
        }

        .card-label {
            font-size: 0.75rem;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .data-content {
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            color: #ff453a;
            word-break: break-all;
            transition: color 0.5s ease;
        }

        .data-card.safe .data-content {
            color: #34c759;
        }

        /* 盾牌图标 */
        .shield-container {
            display: flex;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .shield-icon {
            width: 80px;
            height: 80px;
            color: #86868b;
            transition: all 0.6s ease;
        }

        .shield-icon.active {
            color: #34c759;
            filter: drop-shadow(0 0 20px rgba(52, 199, 89, 0.5));
        }

        /* 加密步骤 */
        .crypto-steps {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 350px;
            margin: 0 auto;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            opacity: 0.3;
            transition: all 0.4s ease;
        }

        .step-item.active {
            opacity: 1;
        }

        .step-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .step-item.active .step-icon {
            background: rgba(52, 199, 89, 0.2);
            border-color: #34c759;
        }

        .step-text {
            font-size: 0.9rem;
            color: #86868b;
            line-height: 1.4;
        }

        .step-item.active .step-text {
            color: #fff;
        }

        /* 结果卡片 */
        .result-card {
            background: rgba(52, 199, 89, 0.1);
            border: 1px solid rgba(52, 199, 89, 0.3);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            text-align: center;
            max-width: 400px;
            margin: 2rem auto 0;
            opacity: 0;
            transform: translateY(20px);
        }

        .result-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .result-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #34c759;
            margin-bottom: 0.5rem;
        }

        .result-desc {
            font-size: 0.85rem;
            color: #86868b;
            line-height: 1.5;
        }

        /* 下一步按钮 */
        .next-arrow-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(20, 20, 20, 0.85);
            padding: 12px 24px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #34c759;
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 100;
            width: max-content;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .next-arrow-btn.show {
            opacity: 1;
            pointer-events: auto;
        }

        .next-arrow-btn:hover {
            background: rgba(52, 199, 89, 0.15);
            border-color: #34c759;
        }

        .next-arrow-btn svg {
            width: 20px;
            height: 20px;
        }

        /* 页脚 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 0.6rem 0;
            text-align: center;
            font-size: 0.75rem;
            color: #86868b;
            background: rgba(0, 0, 0, 0.3);
            z-index: 50;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .wrapper {
                padding: 15px;
                padding-bottom: 140px;
            }

            .page-title {
                font-size: 1.4rem;
            }

            .status-text {
                font-size: 0.9rem;
            }

            .crypto-container {
                padding: 0 10px;
            }

            .data-card {
                padding: 1.2rem;
            }

            .data-content {
                font-size: 0.85rem;
            }

            .shield-icon {
                width: 60px;
                height: 60px;
            }

            .step-text {
                font-size: 0.8rem;
            }

            .result-card {
                padding: 1.2rem 1.5rem;
            }

            .result-desc {
                font-size: 0.8rem;
            }

            .next-arrow-btn {
                bottom: 40px;
                padding: 10px 20px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <div class="wrapper">
        <div class="header">
            <h1 class="page-title">第四步：HTTPS / TLS 加密</h1>
            <div class="status-text" id="statusText">当前状态：明文传输（危险）</div>
        </div>

        <div class="crypto-container">
            <!-- 数据对比 -->
            <div class="data-comparison">
                <div class="data-card danger" id="plainCard">
                    <div class="card-label">加密前（明文）</div>
                    <div class="data-content" id="plainData">
                        &lt;span&gt;我的密码: 123456&lt;/span&gt;
                    </div>
                </div>

                <div class="shield-container">
                    <svg class="shield-icon" id="shield" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm-1 6h2v2h-2V8zm0 4h2v6h-2v-6z"/>
                    </svg>
                </div>

                <div class="data-card safe" id="encryptedCard">
                    <div class="card-label">加密后（密文）</div>
                    <div class="data-content" id="encryptedData">
                        等待加密...
                    </div>
                </div>
            </div>

            <!-- 加密步骤 -->
            <div class="crypto-steps">
                <div class="step-item" id="step1">
                    <div class="step-icon">🔑</div>
                    <div class="step-text">客户端发起 HTTPS 请求，服务器返回证书</div>
                </div>
                <div class="step-item" id="step2">
                    <div class="step-icon">✅</div>
                    <div class="step-text">客户端验证证书有效性，确认服务器身份</div>
                </div>
                <div class="step-item" id="step3">
                    <div class="step-icon">🔐</div>
                    <div class="step-text">双方协商加密算法，生成会话密钥</div>
                </div>
                <div class="step-item" id="step4">
                    <div class="step-icon">🛡️</div>
                    <div class="step-text">建立安全通道，数据混合加密传输</div>
                </div>
            </div>

            <!-- 结果卡片 -->
            <div class="result-card" id="resultCard">
                <div class="result-icon">🔒</div>
                <div class="result-title">安全连接已建立！</div>
                <div class="result-desc">非对称加密 + 对称加密，双重保护你的数据安全。</div>
            </div>
        </div>
    </div>

    <a href="certificate.html" class="next-arrow-btn" id="nextBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4V20M12 20L5 13M12 20L19 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>点击领取你的冲浪证书</span>
    </a>

    <footer class="footer">
        <p>&copy; 2026 报文侦探. All Rights Reserved.</p>
    </footer>

    <script>
// TLS 加密动画序列 - 每步约2.8秒
        const steps = [
            { step: 'step1', status: '正在发起 HTTPS 安全请求...', delay: 1800 },
            { step: 'step2', status: '验证服务器 TLS 证书...', delay: 1800 },
            { step: 'step3', status: '协商加密算法与密钥...', delay: 1800 },
            { step: 'step4', status: '建立安全加密通道...', delay: 1800 }
        ];

        let currentStep = 0;

        function runCryptoStep() {
            if (currentStep >= steps.length) {
                showResult();
                return;
            }

            const step = steps[currentStep];

            if (step.step) {
                document.querySelectorAll('.step-item').forEach(s => s.classList.remove('active'));
                const stepEl = document.getElementById(step.step);
                if (stepEl) stepEl.classList.add('active');
            }

            if (step.status) {
                document.getElementById('statusText').textContent = step.status;
            }

            // 最后一步时触发加密效果
            if (currentStep === steps.length - 1) {
                setTimeout(encryptData, 500);
            }

            currentStep++;
            setTimeout(runCryptoStep, step.delay);
        }

        function encryptData() {
            const statusText = document.getElementById('statusText');
            const encryptedData = document.getElementById('encryptedData');
            const shield = document.getElementById('shield');

            // 更新状态
            statusText.textContent = '加密完成！数据已安全加密传输';
            statusText.classList.add('success');

            // 加密数据
            encryptedData.textContent = '0x8F3A9B2C4E...D7F1 (混合加密密文)';

            // 盾牌变绿
            shield.classList.add('active');
        }

function showResult() {
            setTimeout(() => {
                document.getElementById('resultCard').classList.add('show');
            }, 1500);

            setTimeout(() => {
                document.getElementById('nextBtn').classList.add('show');
            }, 2500);

            // 缓慢滑动到底部
            setTimeout(() => {
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: 'smooth'
                });
            }, 3000);
        }

        // 页面加载后开始动画
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(runCryptoStep, 1500);
        });
    </script>
</body>
</html>
