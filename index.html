<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一场冲浪旅行的起点 | 毕业设计展</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
        }

        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(41, 151, 255, 0.12) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hero-content {
            text-align: center;
            max-width: 600px;
            padding: 0 20px;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, #2997ff 0%, #30b0c7 50%, #34c759 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sub-hero {
            color: #fff;
        }

        .hero-desc {
            font-size: 1.25rem;
            color: #86868b;
            line-height: 1.6;
            font-weight: 300;
            max-width: 480px;
            margin: 0 auto;
        }

        .highlight {
            color: #fff;
            font-weight: 400;
        }

        /* 下一步按钮 */
        .next-arrow-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(20, 20, 20, 0.85);
            padding: 12px 24px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #2997ff;
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 100;
            width: max-content;
            white-space: nowrap;
        }

        .next-arrow-btn:hover {
            background: rgba(41, 151, 255, 0.15);
            border-color: #2997ff;
        }

        .next-arrow-btn svg {
            width: 20px;
            height: 20px;
            animation: bounceDown 2s ease-in-out infinite;
        }

        @keyframes bounceDown {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(4px);
            }
            60% {
                transform: translateY(2px);
            }
        }

        /* 页脚 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 0.6rem 0;
            text-align: center;
            font-size: 0.75rem;
            color: #86868b;
            background: rgba(0, 0, 0, 0.3);
            z-index: 50;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .wrapper {
                padding: 15px;
                padding-bottom: 140px;
            }

            .hero-title {
                font-size: 2.2rem;
            }

            .hero-desc {
                font-size: 1rem;
            }

            .next-arrow-btn {
                bottom: 40px;
                padding: 10px 20px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <div class="wrapper">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="gradient-text">欢迎观看</span><br>
                <span class="sub-hero">一场冲浪旅行</span>
            </h1>
            <p class="hero-desc">
                这是一次关于 <span class="highlight">0 与 1</span>，<span class="highlight">光纤与协议</span>的数字视觉漫游。
            </p>
        </div>
    </div>

    <a href="about.html" class="next-arrow-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4V20M12 20L5 13M12 20L19 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>点击开启旅程</span>
    </a>

    <footer class="footer">
        <p>&copy; 2026 报文侦探. All Rights Reserved.</p>
    </footer>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();

            tl.from(".hero-title", {
                duration: 1.2,
                y: 50,
                opacity: 0,
                ease: "power4.out"
            })
            .from(".hero-desc", {
                duration: 1,
                y: 30,
                opacity: 0,
                ease: "power3.out"
            }, "-=0.5")
            .from(".next-arrow-btn", {
                duration: 0.8,
                opacity: 0,
                y: 20,
                ease: "power2.out"
            }, "-=0.3");
        });
    </script>
</body>
</html>
