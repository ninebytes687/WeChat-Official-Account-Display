<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCP 三次握手 | 毕业设计展</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
        }

        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 159, 10, 0.1) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 150px;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ff9f0a 0%, #ff6b35 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-text {
            font-size: 1rem;
            color: #ff9f0a;
            font-weight: 300;
            min-height: 1.5rem;
        }

        .status-text.success {
            color: #34c759;
        }

        /* 三次握手区域 */
        .handshake-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .handshake-visual {
            position: relative;
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        /* 两端标签 */
        .endpoint {
            background: #1c1c1e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            text-align: center;
            min-width: 130px;
        }

        .endpoint-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .endpoint-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
        }

        .endpoint-role {
            font-size: 0.75rem;
            color: #86868b;
            margin-top: 0.25rem;
        }

        /* 信号线区域 */
        .signal-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% - 260px);
            height: 200px;
            pointer-events: none;
        }

        .signal-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
        }

        .signal-line:nth-child(1) { top: 0; }
        .signal-line:nth-child(2) { top: 50%; }
        .signal-line:nth-child(3) { top: 100%; }

        /* 报文卡片 */
        .packet-card {
            background: rgba(255, 159, 10, 0.1);
            border: 1px solid rgba(255, 159, 10, 0.3);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
            margin-bottom: 1rem;
        }

        .packet-card.active {
            opacity: 1;
            transform: translateY(0);
        }

        .packet-card.success {
            background: rgba(52, 199, 89, 0.1);
            border-color: rgba(52, 199, 89, 0.3);
        }

        .packet-label {
            font-size: 0.75rem;
            color: #86868b;
            margin-bottom: 0.3rem;
        }

        .packet-content {
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: #ff9f0a;
        }

        .packet-card.success .packet-content {
            color: #34c759;
        }

        .packet-direction {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        /* 握手步骤 */
        .handshake-steps {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            opacity: 0.3;
            transition: all 0.4s ease;
        }

        .step-item.active {
            opacity: 1;
        }

        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .step-item.active .step-number {
            background: rgba(255, 159, 10, 0.2);
            border-color: #ff9f0a;
            color: #ff9f0a;
        }

        .step-item.success .step-number {
            background: rgba(52, 199, 89, 0.2);
            border-color: #34c759;
            color: #34c759;
        }

        .step-text {
            font-size: 0.9rem;
            color: #86868b;
        }

        .step-item.active .step-text {
            color: #fff;
        }

        .step-item.success .step-text {
            color: #34c759;
        }

        /* 结果卡片 */
        .result-card {
            background: rgba(52, 199, 89, 0.1);
            border: 1px solid rgba(52, 199, 89, 0.3);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            text-align: center;
            max-width: 350px;
            margin: 2rem auto 0;
            opacity: 0;
            transform: translateY(20px);
        }

        .result-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .result-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #34c759;
            margin-bottom: 0.5rem;
        }

        .result-desc {
            font-size: 0.85rem;
            color: #86868b;
            line-height: 1.5;
        }

        /* 下一步按钮 */
        .next-arrow-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(20, 20, 20, 0.85);
            padding: 12px 24px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ff9f0a;
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 100;
            width: max-content;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .next-arrow-btn.show {
            opacity: 1;
            pointer-events: auto;
        }

        .next-arrow-btn:hover {
            background: rgba(255, 159, 10, 0.15);
            border-color: #ff9f0a;
        }

        .next-arrow-btn svg {
            width: 20px;
            height: 20px;
        }

        /* 页脚 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 0.6rem 0;
            text-align: center;
            font-size: 0.75rem;
            color: #86868b;
            background: rgba(0, 0, 0, 0.3);
            z-index: 50;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .wrapper {
                padding: 15px;
                padding-bottom: 140px;
            }

            .page-title {
                font-size: 1.4rem;
            }

            .status-text {
                font-size: 0.9rem;
            }

            .handshake-container {
                padding: 0 10px;
            }

            .endpoint {
                padding: 0.8rem 1rem;
                min-width: 100px;
            }

            .endpoint-icon {
                font-size: 1.5rem;
            }

            .endpoint-name {
                font-size: 0.85rem;
            }

            .endpoint-role {
                font-size: 0.65rem;
            }

            .packet-card {
                padding: 0.8rem 1rem;
            }

            .packet-content {
                font-size: 0.85rem;
            }

            .step-text {
                font-size: 0.8rem;
            }

            .result-card {
                padding: 1.2rem 1.5rem;
            }

            .next-arrow-btn {
                bottom: 40px;
                padding: 10px 20px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <div class="wrapper">
        <div class="header">
            <h1 class="page-title">第三步：TCP 三次握手</h1>
            <div class="status-text" id="statusText">握手即将开始...</div>
        </div>

        <div class="handshake-container">
            <!-- 两端展示 -->
            <div class="handshake-visual">
                <div class="endpoint" id="client">
                    <span class="endpoint-icon">💻</span>
                    <div class="endpoint-name">浏览器</div>
                    <div class="endpoint-role">Client</div>
                </div>
                <div class="endpoint" id="server">
                    <span class="endpoint-icon">⚙️</span>
                    <div class="endpoint-name">服务器</div>
                    <div class="endpoint-role">Server</div>
                </div>
            </div>

            <!-- 握手步骤 -->
            <div class="handshake-steps">
                <!-- 步骤1 -->
                <div class="step-item" id="step1">
                    <div class="step-number">1</div>
                    <div class="step-text">
                        <div style="color: #2997ff; margin-bottom: 0.25rem;">客户端 → 服务器</div>
                        <div style="font-family: monospace; font-size: 0.8rem;">SYN (seq=x)</div>
                    </div>
                </div>

                <!-- 步骤2 -->
                <div class="step-item" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-text">
                        <div style="color: #34c759; margin-bottom: 0.25rem;">服务器 → 客户端</div>
                        <div style="font-family: monospace; font-size: 0.8rem;">SYN-ACK (seq=y, ack=x+1)</div>
                    </div>
                </div>

                <!-- 步骤3 -->
                <div class="step-item" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-text">
                        <div style="color: #2997ff; margin-bottom: 0.25rem;">客户端 → 服务器</div>
                        <div style="font-family: monospace; font-size: 0.8rem;">ACK (seq=x+1, ack=y+1)</div>
                    </div>
                </div>
            </div>

            <!-- 结果卡片 -->
            <div class="result-card" id="resultCard">
                <div class="result-icon">🤝</div>
                <div class="result-title">连接已建立！</div>
                <div class="result-desc">可靠连接已就绪，可以开始传输数据了。</div>
            </div>
        </div>
    </div>

    <a href="https-tls.html" class="next-arrow-btn" id="nextBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4V20M12 20L5 13M12 20L19 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>连接已就绪，如何保障安全？</span>
    </a>

    <footer class="footer">
        <p>&copy; 2026 报文侦探. All Rights Reserved.</p>
    </footer>

    <script>
        // TCP 三次握手动画序列
        const steps = [
            { step: 'step1', status: '1. 客户端发送 SYN，请求建立连接', delay: 1000 },
            { step: null, status: '2. 服务器收到 SYN，返回 SYN-ACK', delay: 1200 },
            { step: 'step2', status: '3. 服务器返回 SYN-ACK，确认请求', delay: 1000 },
            { step: null, status: '4. 客户端发送 ACK，确认连接', delay: 1200 },
            { step: 'step3', status: '5. 三次握手完成，可靠连接建立！', delay: 800 }
        ];

        let currentStep = 0;

        function runHandshakeStep() {
            if (currentStep >= steps.length) {
                showResult();
                return;
            }

            const step = steps[currentStep];

            if (step.step) {
                // 高亮当前步骤
                document.querySelectorAll('.step-item').forEach(s => s.classList.remove('active'));
                const stepEl = document.getElementById(step.step);
                if (stepEl) stepEl.classList.add('active');
            }

            if (step.status) {
                const statusText = document.getElementById('statusText');
                statusText.textContent = step.status;
                if (currentStep === steps.length - 1) {
                    statusText.classList.add('success');
                }
            }

            currentStep++;
            setTimeout(runHandshakeStep, step.delay);
        }

        function showResult() {
            // 所有步骤完成
            document.querySelectorAll('.step-item').forEach(s => {
                s.classList.remove('active');
                s.classList.add('success');
            });

            // 显示结果卡片
            setTimeout(() => {
                document.getElementById('resultCard').classList.add('show');
            }, 500);

            // 显示下一步按钮
            setTimeout(() => {
                document.getElementById('nextBtn').classList.add('show');
            }, 1000);

            // 缓慢滑动到底部
            setTimeout(() => {
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: 'smooth'
                });
            }, 1200);
        }

        // 页面加载后开始动画
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(runHandshakeStep, 1500);
        });
    </script>
</body>
</html>
